<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garmin Recovery Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <h1>GARMIN DASHBOARD</h1>
    <div id="auth-section">
      <div id="login-form" style="display: none;">
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button id="login-btn">Login</button>
      </div>
      <div id="user-info" style="display: none;">
        <span id="username-display">—</span>
        <button id="logout-btn">Logout</button>
      </div>
    </div>
  </header>
  <main class="container">
    <section class="card">
      <div class="current-block">
        <div>
          <div id="profile-name" class="profile-name">Profile: —</div>
        </div>
        <button id="get-now-btn">Get Now</button>
      </div>
      <div class="metrics-row">
        <div class="metric-col">
          <h2>Heart Rate</h2>
          <div id="current-status">Загрузка...</div>
        </div>
        <div class="metric-col">
          <h2>Body Battery</h2>
          <div id="battery-status">Загрузка...</div>
        </div>
        <div class="metric-col details-col">
          <div id="current-details"></div>
        </div>
      </div>
    </section>
    <section class="card">
      <h2>History (24h)</h2>
      <canvas id="historyChart" width="800" height="400"></canvas>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>

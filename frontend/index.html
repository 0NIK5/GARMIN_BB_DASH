<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Garmin Recovery Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-slot" data-slot="left">
      <div class="auth-section">
        <div class="slot-label">Left account</div>
        <div class="login-form" data-role="login-form">
          <input type="text" data-role="username" placeholder="Username" />
          <input type="password" data-role="password" placeholder="Password" />
          <button data-role="login-btn">Login</button>
        </div>
        <div class="user-info" data-role="user-info" hidden>
          <span data-role="username-display">—</span>
          <button data-role="logout-btn">Logout</button>
        </div>
      </div>
    </div>
    <h1 class="header-title">GARMIN DASHBOARD</h1>
    <div class="header-slot header-slot-right" data-slot="right">
      <div class="auth-section">
        <div class="slot-label">Right account</div>
        <div class="login-form" data-role="login-form">
          <input type="text" data-role="username" placeholder="Username" />
          <input type="password" data-role="password" placeholder="Password" />
          <button data-role="login-btn">Login</button>
        </div>
        <div class="user-info" data-role="user-info" hidden>
          <span data-role="username-display">—</span>
          <button data-role="logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="metrics-grid">
      <section class="card slot-card" data-slot="left">
        <div class="current-block">
          <div>
            <div class="profile-name" data-role="profile-name">Profile: —</div>
          </div>
          <button class="get-now-btn" data-role="get-now-btn">Get Now</button>
        </div>
        <div class="metrics-row">
          <div class="metric-col">
            <h2>Heart Rate</h2>
            <div data-role="current-status">Загрузка...</div>
          </div>
          <div class="metric-col">
            <h2>Body Battery</h2>
            <div data-role="battery-status">Загрузка...</div>
          </div>
          <div class="metric-col details-col">
            <div data-role="current-details"></div>
          </div>
        </div>
      </section>
      <section class="card slot-card" data-slot="right">
        <div class="current-block">
          <div>
            <div class="profile-name" data-role="profile-name">Profile: —</div>
          </div>
          <button class="get-now-btn" data-role="get-now-btn">Get Now</button>
        </div>
        <div class="metrics-row">
          <div class="metric-col">
            <h2>Heart Rate</h2>
            <div data-role="current-status">Загрузка...</div>
          </div>
          <div class="metric-col">
            <h2>Body Battery</h2>
            <div data-role="battery-status">Загрузка...</div>
          </div>
          <div class="metric-col details-col">
            <div data-role="current-details"></div>
          </div>
        </div>
      </section>
    </div>
    <section class="card chart-card" data-slot="left">
      <h2>History (24h) — Left</h2>
      <canvas data-role="historyChart" width="1100" height="360"></canvas>
    </section>
    <section class="card chart-card" data-slot="right">
      <h2>History (24h) — Right</h2>
      <canvas data-role="historyChart" width="1100" height="360"></canvas>
    </section>
  </main>
  <script src="app.js?v=3.1"></script>
</body>
</html>
